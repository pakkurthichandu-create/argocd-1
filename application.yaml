apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoUrl: 
    revisionTarget: HEAD
    path: dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    
    automated:
      selfHeal: true
      prune: true